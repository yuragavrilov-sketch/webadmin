{% extends "base.html" %}
{% block title %}Журнал — Service Portal{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0"><i class="bi bi-journal-text me-2"></i>Журнал действий</h4>
  <div class="d-flex gap-2">
    <select id="filter-server" class="form-select form-select-sm" style="width:200px">
      <option value="">Все серверы</option>
    </select>
    <select id="filter-limit" class="form-select form-select-sm" style="width:120px">
      <option value="50">50 записей</option>
      <option value="100">100 записей</option>
      <option value="200" selected>200 записей</option>
      <option value="500">500 записей</option>
    </select>
    <button class="btn btn-sm btn-outline-secondary" id="btn-refresh">
      <i class="bi bi-arrow-clockwise"></i> Обновить
    </button>
  </div>
</div>

<div class="card">
  <div class="card-body p-0">
    <div id="loading" class="text-center py-5">
      <div class="spinner-border text-primary"></div>
    </div>
    <div class="table-responsive d-none" id="table-wrap">
      <table class="table table-hover table-sm mb-0">
        <thead class="table-light">
          <tr>
            <th>Время</th>
            <th>Сервер</th>
            <th>Сервис</th>
            <th>Действие</th>
            <th>Результат</th>
            <th>Сообщение</th>
          </tr>
        </thead>
        <tbody id="logs-tbody"></tbody>
      </table>
    </div>
    <div id="empty-msg" class="text-center py-5 text-muted d-none">
      <i class="bi bi-journal-x fs-1 d-block mb-2"></i>
      Нет записей в журнале
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const actionLabels = { start: 'Запуск', stop: 'Остановка', restart: 'Перезапуск' };
const actionColors = { start: 'success', stop: 'secondary', restart: 'warning' };

async function loadLogs() {
  const serverId = document.getElementById('filter-server').value;
  const limit = document.getElementById('filter-limit').value;
  let url = `/api/logs?limit=${limit}`;
  if (serverId) url += `&server_id=${serverId}`;

  document.getElementById('loading').classList.remove('d-none');
  document.getElementById('table-wrap').classList.add('d-none');
  document.getElementById('empty-msg').classList.add('d-none');

  const { ok, data } = await apiCall(url);
  document.getElementById('loading').classList.add('d-none');

  if (!ok) { showToast('Ошибка загрузки журнала', 'danger'); return; }

  if (!data.length) {
    document.getElementById('empty-msg').classList.remove('d-none');
    return;
  }

  document.getElementById('table-wrap').classList.remove('d-none');
  document.getElementById('logs-tbody').innerHTML = data.map(l => {
    const dt = new Date(l.performed_at);
    const dateStr = dt.toLocaleString('ru-RU');
    const action = actionLabels[l.action] || l.action;
    const actionColor = actionColors[l.action] || 'secondary';
    const resultBadge = l.success
      ? '<span class="badge bg-success">Успешно</span>'
      : '<span class="badge bg-danger">Ошибка</span>';
    return `
      <tr class="${l.success ? '' : 'table-danger'}">
        <td class="small text-muted text-nowrap">${dateStr}</td>
        <td><strong>${esc(l.server_name || '')}</strong></td>
        <td class="font-monospace small">${esc(l.service_name)}</td>
        <td><span class="badge bg-${actionColor}">${action}</span></td>
        <td>${resultBadge}</td>
        <td class="small text-muted">${esc(l.message || '')}</td>
      </tr>`;
  }).join('');
}

async function loadServerFilter() {
  const { ok, data } = await apiCall('/api/servers');
  if (!ok) return;
  const sel = document.getElementById('filter-server');
  data.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name;
    sel.appendChild(opt);
  });
}

document.getElementById('btn-refresh').addEventListener('click', loadLogs);
document.getElementById('filter-server').addEventListener('change', loadLogs);
document.getElementById('filter-limit').addEventListener('change', loadLogs);

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

loadServerFilter().then(loadLogs);
</script>
{% endblock %}
